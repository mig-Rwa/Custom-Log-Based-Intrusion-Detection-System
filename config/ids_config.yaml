# ============================================================
# Custom Log-Based Intrusion Detection System (IDS) Config
# ============================================================

general:
  monitor_interval: 5          # seconds between log checks
  log_format: "syslog"          # syslog | auth | custom
  timezone: "UTC"

# --- Log Sources ---
log_sources:
  auth_log: "logs/sample_auth.log"
  syslog: "logs/sample_syslog.log"
  # For live Linux monitoring, use:
  # auth_log: "/var/log/auth.log"
  # syslog: "/var/log/syslog"

# --- Detection Rules ---
detection_rules:

  ssh_brute_force:
    enabled: true
    description: "Detect SSH brute-force attempts (multiple failed logins)"
    threshold: 5                # failed attempts to trigger
    time_window: 60             # seconds
    severity: "HIGH"
    patterns:
      - "Failed password for"
      - "Failed password for invalid user"
    mitre_attack:
      tactic: "Credential Access"
      technique: "T1110.001"
      name: "Brute Force: Password Guessing"

  ssh_invalid_user:
    enabled: true
    description: "Detect login attempts with non-existent usernames"
    threshold: 3
    time_window: 120
    severity: "MEDIUM"
    patterns:
      - "Invalid user"
      - "input_userauth_request: invalid user"
    mitre_attack:
      tactic: "Credential Access"
      technique: "T1110.003"
      name: "Brute Force: Password Spraying"

  sudo_abuse:
    enabled: true
    description: "Detect excessive sudo failures (privilege escalation attempts)"
    threshold: 3
    time_window: 300
    severity: "HIGH"
    patterns:
      - "sudo:.*authentication failure"
      - "sudo:.*incorrect password attempts"
      - "sudo:.*NOT in sudoers"
    mitre_attack:
      tactic: "Privilege Escalation"
      technique: "T1548.003"
      name: "Abuse Elevation Control: Sudo and Sudo Caching"

  port_scan_indicator:
    enabled: true
    description: "Detect port scan indicators from connection refused bursts"
    threshold: 10
    time_window: 30
    severity: "MEDIUM"
    patterns:
      - "Connection closed by"
      - "refused connect from"
      - "Did not receive identification string"
    mitre_attack:
      tactic: "Reconnaissance"
      technique: "T1046"
      name: "Network Service Discovery"

  root_login_attempt:
    enabled: true
    description: "Detect direct root login attempts (should always alert)"
    threshold: 1
    time_window: 60
    severity: "CRITICAL"
    patterns:
      - "Failed password for root"
      - "ROOT LOGIN REFUSED"
      - "FAILED LOGIN.*root"
    mitre_attack:
      tactic: "Credential Access"
      technique: "T1078.003"
      name: "Valid Accounts: Local Accounts"

  session_anomaly:
    enabled: true
    description: "Detect session opened/closed anomalies (rapid sessions)"
    threshold: 10
    time_window: 60
    severity: "LOW"
    patterns:
      - "session opened for user"
      - "session closed for user"
    mitre_attack:
      tactic: "Persistence"
      technique: "T1078"
      name: "Valid Accounts"

# --- Alert Output ---
alerting:
  output_file: "alerts/ids_alerts.json"
  console_output: true
  log_file: "alerts/ids_events.log"
  alert_format: "json"           # json | cef | leef

# --- SIEM Forwarding ---
siem:
  enabled: false                 # set true when SIEM is ready
  type: "splunk"                 # splunk | elk | generic_syslog

  splunk:
    hec_url: "https://localhost:8088/services/collector/event"
    hec_token: "YOUR-SPLUNK-HEC-TOKEN"
    index: "security"
    sourcetype: "custom_ids"
    verify_ssl: false

  elk:
    elasticsearch_url: "http://localhost:9200"
    index: "ids-alerts"
    api_key: ""

  generic_syslog:
    host: "localhost"
    port: 514
    protocol: "udp"              # udp | tcp

# --- Whitelisting ---
whitelist:
  ips:
    - "127.0.0.1"
    # - "192.168.1.100"          # add trusted IPs here
  users:
    - "vagrant"
    # - "deploy-bot"             # add service accounts here
